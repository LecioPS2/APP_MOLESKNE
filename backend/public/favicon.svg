<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A88FF"/>
      <stop offset="100%" stop-color="#2D3B8E"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="100" />
  
  <g stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Camera Viewfinder Corners -->
    <path d="M 140 100 L 100 100 L 100 140" fill="none" stroke-width="24" />
    <path d="M 372 100 L 412 100 L 412 140" fill="none" stroke-width="24" />
    <path d="M 140 412 L 100 412 L 100 372" fill="none" stroke-width="24" />
    <path d="M 372 412 L 412 412 L 412 372" fill="none" stroke-width="24" />

    <!-- Document Outline -->
    <!-- The document has a folded corner at top right -->
    <path d="M 180 120 L 290 120 L 350 180 L 350 390 L 180 390 Z" fill="none" stroke-width="20" />
    <path d="M 290 120 L 290 180 L 350 180" fill="none" stroke-width="20" />
    
    <!-- Text Lines on Document -->
    <line x1="210" y1="210" x2="320" y2="210" stroke-width="16" />
    <line x1="210" y1="250" x2="320" y2="250" stroke-width="16" />
    <line x1="210" y1="290" x2="320" y2="290" stroke-width="16" />
    <line x1="210" y1="330" x2="320" y2="330" stroke-width="16" />
    <line x1="210" y1="370" x2="280" y2="370" stroke-width="16" />

    <!-- Left Vertical Edge line -->
    <line x1="140" y1="120" x2="140" y2="390" stroke-width="16" />

    <!-- Scanner Line -->
    <line x1="80" y1="310" x2="432" y2="310" stroke-width="24" />
  </g>
</svg>